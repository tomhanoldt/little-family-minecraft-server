[minecraft]
mini-server ansible_host=minecraft-server ansible_user=mono ansible_ssh_private_key_file=/root/.ssh/th_rsa
# ^ Adjust the IP/hostname and SSH user of the mini-PC.
# If you're already on the same tailnet, you can also use the
# MagicDNS name here, e.g. mini-server.yourtailnet.ts.net
# ansible_ssh_private_key_file points to the path INSIDE the ansible Docker container
# (see Dockerfile.ansible / docker-compose.yml, the key is mounted read-only).
