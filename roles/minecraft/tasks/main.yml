---
- name: Create data directories
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    mode: "0755"
  loop:
    - "{{ mc_data_dir }}"
    - "{{ mc_data_dir }}/data"
    - "{{ mc_data_dir }}/backups"
    - "{{ mc_data_dir }}/managed"

- name: Resolve whitelist/ops usernames to real UUIDs (fails here, not as a live crash-loop)
  ansible.builtin.import_tasks: resolve_players.yml

- name: Write whitelist.json (Java entries only - see resolve_players.yml)
  ansible.builtin.copy:
    content: "{{ mc_whitelist_resolved | to_nice_json }}"
    dest: "{{ mc_data_dir }}/managed/whitelist.json"
    mode: "0644"

- name: Write ops.json (Java entries only - see resolve_players.yml)
  ansible.builtin.copy:
    content: "{{ mc_ops_resolved | to_nice_json }}"
    dest: "{{ mc_data_dir }}/managed/ops.json"
    mode: "0644"

- name: Create ChatFilter plugin directory
  ansible.builtin.file:
    path: "{{ mc_data_dir }}/data/plugins/ChatFilter"
    state: directory
    mode: "0755"
  when: enable_chat_filter | bool

- name: Pre-seed ChatFilter config with malicious-content filters enabled
  ansible.builtin.copy:
    src: chatfilter-filter.yml
    dest: "{{ mc_data_dir }}/data/plugins/ChatFilter/filter.yml"
    mode: "0644"
    force: false
  when: enable_chat_filter | bool

- name: Pre-seed permissions.yml so non-ops can use /gamemode and /tp themselves
  ansible.builtin.copy:
    src: permissions.yml
    dest: "{{ mc_data_dir }}/data/permissions.yml"
    mode: "0644"
    # No force: false here (unlike ChatFilter's filter.yml) - Paper itself
    # creates an EMPTY permissions.yml placeholder on first boot, which
    # force: false would then treat as "already exists" and never actually
    # write our content into. Always sync this one.

- name: Check whether EssentialsX has generated its config yet
  ansible.builtin.stat:
    path: "{{ mc_data_dir }}/data/plugins/Essentials/config.yml"
  register: essentials_config
  when: enable_essentials | bool

- name: Disable EssentialsX /tp so vanilla /tp (with Bedrock's player picker) takes the label
  ansible.builtin.lineinfile:
    path: "{{ mc_data_dir }}/data/plugins/Essentials/config.yml"
    insertafter: '^disabled-commands:'
    regexp: '^\s*-\s*tp\s*$'
    line: "  - tp"
  # Bedrock (Geyser) only renders an online-player picker for a real target
  # selector argument, which vanilla /tp has and Essentials' plain-string /tp
  # does not - see docs/plugins.md. Disabling the Essentials command hands /tp
  # to vanilla for everyone (Java keeps tab-complete). Requires the config to
  # exist first: EssentialsX writes it on its first boot, so on a brand-new
  # server this applies on the next deploy. A container restart is needed for
  # the command-map change to take effect.
  when:
    - enable_essentials | bool
    - essentials_config.stat.exists | default(false)

- name: Generate docker-compose.yml from template
  ansible.builtin.template:
    src: docker-compose.yml.j2
    dest: "{{ mc_data_dir }}/docker-compose.yml"
    mode: "0644"
  register: compose_file

- name: Start/update Minecraft server (+ backup sidecar)
  community.docker.docker_compose_v2:
    project_src: "{{ mc_data_dir }}"
    state: present
    pull: "always"

- name: Set up Home Assistant game-stats JSON server
  ansible.builtin.import_tasks: ha_stats.yml
  tags: home_assistant_stats
  when: enable_home_assistant_stats | bool

- name: Cronjob for automatic start (playtime schedule)
  ansible.builtin.cron:
    name: "minecraft-server-start"
    job: "cd {{ mc_data_dir }} && /usr/bin/docker compose start mc"
    minute: "{{ playtime_start_cron.split(' ')[0] }}"
    hour: "{{ playtime_start_cron.split(' ')[1] }}"
  when: enable_playtime_schedule | bool

- name: Cronjob for automatic stop (playtime schedule)
  ansible.builtin.cron:
    name: "minecraft-server-stop"
    job: "cd {{ mc_data_dir }} && /usr/bin/docker compose stop mc"
    minute: "{{ playtime_stop_cron.split(' ')[0] }}"
    hour: "{{ playtime_stop_cron.split(' ')[1] }}"
  when: enable_playtime_schedule | bool

- name: Query available Paper builds for the pinned version
  ansible.builtin.uri:
    url: "https://fill.papermc.io/v3/projects/paper/versions/{{ mc_version }}/builds"
    headers:
      User-Agent: "little-family-mincraft-server-ansible/1.0"
    return_content: true
  register: paper_builds
  when: mc_type | upper == 'PAPER' and mc_version | upper != 'LATEST'
  tags: paper_update_check

- name: Find currently installed Paper jar
  ansible.builtin.shell: >-
    set -o pipefail && ls {{ mc_data_dir }}/data/paper-{{ mc_version }}-*.jar 2>/dev/null | head -1
  args:
    executable: /bin/bash
  register: installed_paper_jar
  changed_when: false
  failed_when: false
  when: mc_type | upper == 'PAPER' and mc_version | upper != 'LATEST'
  tags: paper_update_check

- name: Show Paper update status
  ansible.builtin.debug:
    msg:
      - "Currently installed: {{ installed_paper_jar.stdout | default('not deployed yet') }}"
      - "Latest stable build for {{ mc_version }}: {{ latest_stable_build }}"
  vars:
    latest_stable_build: >-
      {{ (paper_builds.json | selectattr('channel', 'equalto', 'STABLE') | map(attribute='id') | list | sort | last)
         if (paper_builds.json is defined and (paper_builds.json | selectattr('channel', 'equalto', 'STABLE') | list | length > 0))
         else 'none found' }}
  when: mc_type | upper == 'PAPER' and mc_version | upper != 'LATEST'
  tags: paper_update_check

- name: Read the itzg Modrinth manifest (which plugin projects/versions are installed)
  ansible.builtin.slurp:
    src: "{{ mc_data_dir }}/data/.modrinth-manifest.json"
  register: modrinth_manifest
  tags: plugin_update_check

- name: Query Modrinth for each managed plugin's published versions
  ansible.builtin.uri:
    url: "https://api.modrinth.com/v2/project/{{ item }}/version"
    headers:
      User-Agent: "little-family-mincraft-server-ansible/1.0"
    return_content: true
  register: plugin_modrinth_versions
  loop: "{{ (modrinth_manifest.content | b64decode | from_json)['projects'] }}"
  loop_control:
    label: "{{ item }}"
  tags: plugin_update_check

- name: Report plugin updates, respecting the pinned mc_version
  ansible.builtin.debug:
    # "newest for {{ mc_version }}" is the safe target - the newest build that
    # still lists our pinned version, i.e. exactly what a plugin refresh would
    # pull. "newest overall" flags a plugin that has moved past us: if it no
    # longer supports {{ mc_version }} we deliberately can't take it (see the
    # pin chain in docs/plugins.md), and for the pin's gatekeepers (coreprotect,
    # chat_filter) a newest-overall that starts supporting a newer MC version
    # is the signal the whole server could finally be bumped.
    # The "supports?" flag is computed across ALL platform builds of the newest
    # version_number (Modrinth lists Paper/Spigot/Fabric/... as separate entries
    # under one version), so a plugin like Geyser isn't falsely reported as
    # dropping us just because its newest-by-date build happens to be the Fabric one.
    msg: >-
      {{ item.item }}: newest for {{ mc_version }} =
      {{ (item.json | selectattr('game_versions', 'contains', mc_version)
          | map(attribute='version_number') | first) | default('NONE (moved past us)', true) }}
      | newest overall = {{ item.json[0].version_number }}
      ({{ item.json[0].version_type }}, supports {{ mc_version }}?
      {{ mc_version in (item.json
         | selectattr('version_number', 'equalto', item.json[0].version_number)
         | map(attribute='game_versions') | flatten | unique | list) }})
  loop: "{{ plugin_modrinth_versions.results }}"
  loop_control:
    label: "{{ item.item }}"
  tags: plugin_update_check

- name: Refresh plugins to the newest mc_version-compatible builds (itzg re-resolves on restart; never pulls an incompatible version)
  community.docker.docker_compose_v2:
    project_src: "{{ mc_data_dir }}"
    state: restarted
    services:
      - mc
  tags:
    - never
    - plugin_update

- name: Restore a chosen backup onto this server (only runs when explicitly tagged)
  ansible.builtin.import_tasks: restore_backup.yml
  tags:
    - never
    - backup_restore
