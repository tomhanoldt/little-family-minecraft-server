---
# Serves Minecraft player/server stats as JSON for Home Assistant to poll
# directly via its built-in RESTful sensor - see docs/home-assistant.md for
# what shows up and why this is built the way it is (RCON stays
# loopback-only, no secrets on the process command line, whitelist.json
# reused for UUID->name mapping, stdlib-only HTTP server so there's no
# broker credentials or extra Python dependency to install at all).

- name: Create directory for the stats server's credentials file
  ansible.builtin.file:
    path: /etc/minecraft
    state: directory
    mode: "0700"

- name: Deploy the stats server's credentials (root-only - never on any command line)
  ansible.builtin.template:
    src: ha-stats.env.j2
    dest: /etc/minecraft/ha-stats.env
    mode: "0600"

- name: Deploy the stats server script
  ansible.builtin.copy:
    src: mc_stats_server.py
    dest: "{{ mc_data_dir }}/mc_stats_server.py"
    mode: "0700"

- name: Deploy stats server systemd service
  ansible.builtin.template:
    src: mc-stats.service.j2
    dest: /etc/systemd/system/mc-stats.service
    mode: "0644"
  notify: Reload systemd daemon

# Flush now, don't wait for end-of-play: on a fresh install systemd has
# never seen this unit file before, so starting it below would fail
# without the daemon-reload handler having actually run yet.
- name: Flush handlers so systemd knows about the new unit file
  ansible.builtin.meta: flush_handlers

- name: Enable and start the stats server
  ansible.builtin.systemd:
    name: mc-stats
    enabled: true
    state: started

- name: Allow the stats server port only from the Tailscale network
  community.general.ufw:
    rule: allow
    port: "{{ mc_stats_port | string }}"
    proto: tcp
    src: "{{ allowed_source_cidr }}"
