# Lets every whitelisted player (not just ops) run /gamemode themselves,
# without granting full op/admin access - see docs/plugins.md.
#
# Two separate grants are needed here, not one: EssentialsX registers its
# own "gamemode" command (same label as vanilla's), and Bukkit gives
# plugin commands priority over the vanilla fallback of the same name -
# so in practice players' /gamemode goes through Essentials, not vanilla,
# and is gated on essentials.gamemode, not minecraft.command.gamemode.
# Granting only the vanilla node (as this file used to) does nothing on a
# server with EssentialsX installed. The vanilla node is kept too in case
# Essentials is ever disabled and the vanilla command becomes reachable
# again.
#
# Unlike vanilla's single flat node, Essentials actually splits self vs.
# other players (essentials.gamemode.others/.all) - only the self-only
# node is granted here, so non-ops can toggle their OWN gamemode but not
# anyone else's.
#
# The same EssentialsX-priority story applies to /tp: Essentials registers
# its own "tp" command under the vanilla label, so a player's /tp is gated
# on essentials.tp, not minecraft.command.teleport - hence both nodes below.
# essentials.tp covers teleporting yourself to another player (/tp <player>);
# essentials.tp.position covers /tp <x> <y> <z>. essentials.tp.others (moving
# OTHER players around) is deliberately left at its op-only default, so a
# non-op can teleport themselves but can't yank anyone else about.
permissions:
  minecraft.command.gamemode:
    default: true
  essentials.gamemode:
    default: true
  minecraft.command.teleport:
    default: true
  essentials.tp:
    default: true
  essentials.tp.position:
    default: true
