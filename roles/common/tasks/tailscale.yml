---
- name: Check whether Tailscale is already installed
  ansible.builtin.command: which tailscale
  register: tailscale_check
  changed_when: false
  failed_when: false

- name: Download and run the Tailscale install script
  ansible.builtin.shell: |
    curl -fsSL https://tailscale.com/install.sh | sh
  args:
    creates: /usr/bin/tailscale
  when: tailscale_check.rc != 0

- name: Enable Tailscale service
  ansible.builtin.systemd:
    name: tailscaled
    enabled: true
    state: started

- name: Connect to tailnet (if auth key is set)
  ansible.builtin.command: >
    tailscale up
    --authkey={{ tailscale_authkey }}
    --hostname={{ tailscale_hostname }}
    --ssh
  when: tailscale_authkey is defined and tailscale_authkey | length > 0
  register: ts_up
  changed_when: "'Success' in ts_up.stdout or ts_up.rc == 0"
  failed_when: false

- name: Query Tailscale status
  ansible.builtin.command: tailscale ip -4
  register: tailscale_ip
  changed_when: false
  failed_when: false

- name: Show Tailscale IP
  ansible.builtin.debug:
    msg: "Mini-PC is reachable on the tailnet at: {{ tailscale_ip.stdout | default('not connected - please check tailscale_authkey or run tailscale up manually') }}"
