name: Security

on:
  push:
  pull_request:
  schedule:
    # Vulnerability databases update independently of our own commits, so
    # re-scan the already-pinned images/dependencies weekly even when
    # nothing in the repo has changed.
    - cron: "0 6 * * 1"

permissions:
  contents: read

jobs:
  image-scan-ansible-tooling:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - run: docker build -f Dockerfile.ansible -t local/ansible-tooling:scan .
      - uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: "local/ansible-tooling:scan"
          format: "sarif"
          output: "trivy-ansible-tooling.sarif"
          severity: "CRITICAL,HIGH"
      - uses: github/codeql-action/upload-sarif@7188fc363630916deb702c7fdcf4e481b751f97a # v4.37.1
        if: always()
        with:
          sarif_file: "trivy-ansible-tooling.sarif"
          category: "trivy-ansible-tooling"

  image-scan-minecraft-server:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    strategy:
      matrix:
        # Kept in sync with the pinned digests in
        # roles/minecraft/templates/docker-compose.yml.j2 - update both
        # together when bumping either image.
        image:
          - "itzg/minecraft-server:java21@sha256:43685ce3678cd9623b55004a477398caa144d2d4c574f69a2eca15a6da5ea405"
          - "itzg/mc-backup:2026.6.2@sha256:324971bd9b77867c5ee8ca510d071e63b96402995c0fb027b270e72f893140db"
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: ${{ matrix.image }}
          format: "sarif"
          output: "trivy-minecraft.sarif"
          severity: "CRITICAL,HIGH"
          trivyignores: ".trivyignore"
      - uses: github/codeql-action/upload-sarif@7188fc363630916deb702c7fdcf4e481b751f97a # v4.37.1
        if: always()
        with:
          sarif_file: "trivy-minecraft.sarif"
          category: "trivy-minecraft-${{ strategy.job-index }}"

  config-scan:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          scan-type: "config"
          scan-ref: "."
          format: "sarif"
          output: "trivy-config.sarif"
          severity: "CRITICAL,HIGH"
      - uses: github/codeql-action/upload-sarif@7188fc363630916deb702c7fdcf4e481b751f97a # v4.37.1
        if: always()
        with:
          sarif_file: "trivy-config.sarif"
          category: "trivy-config"

  secret-scan:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0 # full history, not just the latest commit
      - uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          scan-type: "fs"
          scan-ref: "."
          scanners: "secret"
          format: "sarif"
          output: "trivy-secrets.sarif"
      - uses: github/codeql-action/upload-sarif@7188fc363630916deb702c7fdcf4e481b751f97a # v4.37.1
        if: always()
        with:
          sarif_file: "trivy-secrets.sarif"
          category: "trivy-secrets"
