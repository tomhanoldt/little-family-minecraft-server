version: 2
updates:
  # Dockerfile.ansible's base image
  - package-ecosystem: "docker"
    directory: "/"
    schedule:
      interval: "daily"

  # Reference file only - see .github/dependabot-refs/docker-compose.yml for why.
  - package-ecosystem: "docker-compose"
    directory: "/.github/dependabot-refs"
    schedule:
      interval: "daily"

  # ansible-core (requirements.txt)
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "daily"

  # Actions used by our own CI workflows
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "daily"
